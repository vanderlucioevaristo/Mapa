<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agenda de Eventos de Belo Horizonte</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-w: 240px;
      --navy: #000b33;
      --navy-mid: #001a6e;
      --gold: #FED141;
      --gold-dark: #c9a500;
      --ink: #1a1f36;
      --muted: #64748b;
      --bg: #f4f5f9;
      --panel: #ffffff;
      --line: rgba(0, 11, 51, 0.12);
      --t: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: "Outfit", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: flex;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w);
      height: 100vh;
      background: linear-gradient(175deg, var(--navy) 0%, var(--navy-mid) 70%, #002080 100%);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: relative;
      z-index: 20;
      box-shadow: 4px 0 24px rgba(0,11,51,.28);
      transition: width var(--t);
      overflow: hidden;
    }
    #sidebar::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 90% -5%, rgba(254,209,65,.16) 0%, transparent 50%),
        radial-gradient(ellipse at 10% 105%, rgba(254,209,65,.10) 0%, transparent 40%);
      pointer-events: none;
    }

    .sidebar-brand {
      padding: 20px 16px 16px;
      border-bottom: 1px solid rgba(254,209,65,.18);
      flex-shrink: 0;
    }
    .sidebar-brand-badge {
      display: inline-block;
      background: var(--gold);
      color: var(--navy);
      font-family: "Montserrat", sans-serif;
      font-weight: 800;
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 6px;
      white-space: nowrap;
    }
    .sidebar-brand-title {
      font-family: "Montserrat", sans-serif;
      font-weight: 800;
      font-size: 20px;
      color: var(--gold);
      white-space: nowrap;
    }
    .sidebar-brand-sub {
      font-size: 11px;
      color: rgba(248,250,252,.55);
      margin-top: 2px;
      white-space: nowrap;
    }

    .sidebar-nav { flex: 1; overflow-y: auto; padding: 14px 0; }
    .nav-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(254,209,65,.55);
      padding: 8px 18px 4px;
      white-space: nowrap;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 18px;
      cursor: pointer;
      border: none;
      background: none;
      text-align: left;
      color: rgba(248,250,252,.82);
      font-family: "Outfit", sans-serif;
      font-size: 14px;
      font-weight: 500;
      border-radius: 8px;
      margin: 1px 8px;
      width: calc(100% - 16px);
      transition: background .18s, color .18s;
      white-space: nowrap;
      position: relative;
      z-index: 1;
    }
    .nav-item:hover { background: rgba(254,209,65,.10); color: #fff; }
    .nav-item.active { background: rgba(254,209,65,.18); color: var(--gold); font-weight: 600; }
    .nav-item.active::before {
      content: "";
      position: absolute;
      left: -8px; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 60%;
      background: var(--gold);
      border-radius: 0 2px 2px 0;
    }
    .nav-icon { font-size: 18px; flex-shrink: 0; line-height: 1; }
    .nav-label { flex: 1; }

    .sidebar-footer {
      padding: 12px 18px 16px;
      border-top: 1px solid rgba(254,209,65,.14);
      font-size: 11px;
      color: rgba(248,250,252,.35);
      white-space: nowrap;
    }

    #sidebar-toggle {
      position: absolute;
      right: -14px; top: 50%;
      transform: translateY(-50%);
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1.5px solid rgba(254,209,65,.35);
      background: var(--navy);
      color: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 30;
      font-size: 14px;
      box-shadow: 0 2px 8px rgba(0,11,51,.35);
      transition: background .2s;
    }
    #sidebar-toggle:hover { background: var(--navy-mid); }

    /* ── Main ── */
    #main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; min-width: 0; }

    #topbar {
      height: 52px;
      background: var(--navy);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 10px rgba(0,11,51,.22);
      z-index: 10;
    }
    #hamburger { display: none; background: none; border: none; color: var(--gold); font-size: 22px; cursor: pointer; padding: 4px; line-height: 1; }
    #topbar-title { font-family: "Montserrat", sans-serif; font-weight: 700; font-size: 15px; color: var(--gold); }
    #topbar-breadcrumb { font-size: 13px; color: rgba(248,250,252,.55); margin-left: 4px; }
    #topbar-breadcrumb::before { content: "/ "; margin-right: 4px; }

    #content-area { flex: 1; position: relative; overflow: hidden; }

    .page-frame {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none; opacity: 0; pointer-events: none;
      transition: opacity .25s ease;
    }
    .page-frame.visible { opacity: 1; pointer-events: auto; }

    #welcome {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      gap: 20px; padding: 40px; text-align: center;
      background:
        radial-gradient(circle at 85% 10%, rgba(0,11,51,.07), transparent 40%),
        radial-gradient(circle at 10% 90%, rgba(254,209,65,.07), transparent 35%),
        var(--bg);
      transition: opacity .3s ease;
      overflow-y: auto;
    }
    #welcome.hidden { opacity: 0; pointer-events: none; }
    .welcome-logo {
      background: var(--navy); color: var(--gold);
      font-family: "Montserrat", sans-serif;
      font-weight: 800; font-size: 36px;
      width: 80px; height: 80px; border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 32px rgba(0,11,51,.22);
    }
    .welcome-title { font-family: "Montserrat", sans-serif; font-weight: 800; font-size: 28px; color: var(--navy); }
    .welcome-subtitle { font-size: 15px; color: var(--muted); max-width: 420px; line-height: 1.6; }
    .welcome-cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
    .welcome-card {
      background: var(--panel);
      border: 1.5px solid var(--line);
      border-top: 3px solid var(--navy);
      border-radius: 14px; padding: 20px 24px;
      width: 220px; cursor: pointer; text-align: center;
      transition: box-shadow .2s, transform .2s;
      box-shadow: 0 3px 12px rgba(0,11,51,.07);
    }
    .welcome-card:hover { box-shadow: 0 8px 28px rgba(0,11,51,.14); transform: translateY(-3px); }
    .welcome-card-icon { font-size: 32px; margin-bottom: 8px; }
    .welcome-card-title { font-family: "Montserrat", sans-serif; font-weight: 700; font-size: 14px; color: var(--navy); }
    .welcome-card-desc { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.5; }

    .upcoming-section {
      width: min(980px, 100%);
      margin-top: 2px;
      background: var(--panel);
      border: 1.5px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 3px 12px rgba(0,11,51,.07);
    }
    .upcoming-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      text-align: left;
    }
    .upcoming-title {
      font-family: "Montserrat", sans-serif;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .03em;
      color: var(--navy);
      text-transform: uppercase;
    }
    .upcoming-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .carousel-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--navy);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
    }
    .carousel-btn:hover { background: #f8fafc; }
    .upcoming-indicator {
      min-width: 56px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      font-weight: 600;
    }
    .events-stage {
      min-height: 176px;
      border-radius: 12px;
      border: 1px dashed rgba(0, 11, 51, .18);
      background: linear-gradient(145deg, #ffffff 0%, #f9fafc 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      text-align: left;
    }
    .event-card {
      width: 100%;
      max-width: 860px;
      border-radius: 12px;
      border: 1px solid var(--line);
      border-left: 5px solid var(--navy);
      background: #fff;
      box-shadow: 0 4px 18px rgba(0,11,51,.08);
      padding: 16px;
      animation: fadein .35s ease;
    }
    .event-date {
      display: inline-block;
      background: rgba(254,209,65,.25);
      color: #5b4500;
      font-size: 11px;
      font-weight: 700;
      border-radius: 999px;
      padding: 4px 10px;
      margin-bottom: 8px;
    }
    .event-title {
      font-family: "Montserrat", sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 7px;
      line-height: 1.3;
    }
    .event-meta {
      font-size: 13px;
      line-height: 1.55;
      color: #334155;
    }
    .events-empty {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }
    @keyframes fadein {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* collapsed */
    body.sidebar-collapsed #sidebar { width: 60px; }
    body.sidebar-collapsed .sidebar-brand-badge,
    body.sidebar-collapsed .sidebar-brand-title,
    body.sidebar-collapsed .sidebar-brand-sub,
    body.sidebar-collapsed .nav-section-label,
    body.sidebar-collapsed .nav-label,
    body.sidebar-collapsed .sidebar-footer { display: none; }
    body.sidebar-collapsed .nav-item { justify-content: center; padding: 14px 0; margin: 1px 4px; width: calc(100% - 8px); }
    body.sidebar-collapsed .nav-item.active::before { display: none; }

    /* mobile */
    #overlay { display: none; position: fixed; inset: 0; background: rgba(0,11,51,.55); z-index: 15; backdrop-filter: blur(2px); }
    @media (max-width: 768px) {
      #sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); box-shadow: none; }
      #sidebar.mobile-open { transform: translateX(0); box-shadow: 4px 0 32px rgba(0,11,51,.4); }
      #overlay.active { display: block; }
      #hamburger { display: block; }
      #sidebar-toggle { display: none; }
      body.sidebar-collapsed #sidebar { width: var(--sidebar-w); }
      body.sidebar-collapsed .sidebar-brand-badge,
      body.sidebar-collapsed .sidebar-brand-title,
      body.sidebar-collapsed .sidebar-brand-sub,
      body.sidebar-collapsed .nav-section-label,
      body.sidebar-collapsed .nav-label,
      body.sidebar-collapsed .sidebar-footer { display: revert; }
      body.sidebar-collapsed .nav-item { justify-content: flex-start; padding: 11px 18px; margin: 1px 8px; width: calc(100% - 16px); }
      .upcoming-header { flex-wrap: wrap; }
      .events-stage { min-height: 210px; }
      .event-title { font-size: 16px; }
    }
  </style>
</head>
<body>

  <div id="overlay"></div>

  <aside id="sidebar">
    <button id="sidebar-toggle" title="Recolher menu">&#8249;</button>
    <div class="sidebar-brand">
      <div class="sidebar-brand-badge">Visite BH</div>
      <div class="sidebar-brand-title">Eventos</div>
      <div class="sidebar-brand-sub">Gerenciamento de Eventos</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Navegação</div>
      <button class="nav-item" data-page="welcome" onclick="showPage('welcome')">
        <span class="nav-icon">🏠</span><span class="nav-label">Início</span>
      </button>
      <div class="nav-section-label" style="margin-top:8px">Ferramentas</div>
      <button class="nav-item" data-page="mapa" onclick="showPage('mapa')">
        <span class="nav-icon">🗺️</span><span class="nav-label">Mapa de Eventos</span>
      </button>
      <button class="nav-item" data-page="calendario" onclick="showPage('calendario')">
        <span class="nav-icon">📅</span><span class="nav-label">Calendário de Eventos</span>
      </button>
        <button class="nav-item" data-page="calendario_v2" onclick="showPage('calendario_v2')">
          <span class="nav-icon">🗓️</span><span class="nav-label">Calendário por Local</span>
        </button>
      <button class="nav-item" data-page="cadastro" onclick="showPage('cadastro')">
        <span class="nav-icon">📝</span><span class="nav-label">Cadastro de Eventos</span>
      </button>
    </nav>
    <div class="sidebar-footer">&copy; 2026 Vander &middot; Eventos BH</div>
  </aside>

  <div id="main">
    <header id="topbar">
      <button id="hamburger" onclick="toggleMobileSidebar()">&#9776;</button>
      <div id="topbar-title">Eventos</div>
      <span id="topbar-breadcrumb">Início</span>
    </header>
    <div id="content-area">
      <div id="welcome">
        <div class="welcome-logo">V</div>
        <div class="welcome-title">Bem-vindo, Vander!</div>
        <div class="welcome-subtitle">Selecione uma ferramenta no menu lateral ou clique em um dos acessos rápidos abaixo.</div>
        <section class="upcoming-section" aria-label="Próximos eventos">
          <div class="upcoming-header">
            <div class="upcoming-title">Próximos Eventos</div>
            <div class="upcoming-controls">
              <button id="carousel-prev" class="carousel-btn" type="button" aria-label="Evento anterior">&#8249;</button>
              <div id="carousel-indicator" class="upcoming-indicator">0 / 0</div>
              <button id="carousel-next" class="carousel-btn" type="button" aria-label="Próximo evento">&#8250;</button>
            </div>
          </div>
          <div id="events-stage" class="events-stage">
            <div id="events-empty" class="events-empty">Carregando eventos...</div>
          </div>
        </section>
      </div>
      <iframe id="frame-mapa"       class="page-frame" src="" title="Mapa de Eventos"></iframe>
      <iframe id="frame-calendario" class="page-frame" src="" title="Calendário de Eventos"></iframe>
        <iframe id="frame-calendario_v2" class="page-frame" src="" title="Calendário por Local"></iframe>
      <iframe id="frame-cadastro" class="page-frame" src="" title="Cadastro de Eventos"></iframe>
    </div>
  </div>

  <script>
    const carouselState = {
      eventos: [],
      atual: 0,
      timer: null,
    };

    const pages = {
      welcome:    { label: 'Início',                  frame: null,               src: null },
      mapa:       { label: 'Mapa de Eventos',         frame: 'frame-mapa',       src: 'mapa.html' },
      calendario: { label: 'Calendário de Eventos',   frame: 'frame-calendario', src: 'calendario.html' },
      calendario_v2: { label: 'Calendário por Local',  frame: 'frame-calendario_v2', src: 'calendario_v2.html' },
      cadastro: { label: 'Cadastro de Eventos', frame: 'frame-cadastro', src: 'cadastro_eventos.html' },
    };
    const loadedFrames = new Set();

    function parseDataCsv(texto) {
      const valor = (texto || '').trim();
      if (!valor) return null;
      const partes = valor.split('/');
      if (partes.length !== 3) return null;

      const dia = parseInt(partes[0], 10);
      const mesTxt = partes[1].slice(0, 3).toUpperCase();
      const ano = parseInt(partes[2], 10);

      const meses = {
        JAN: 0, FEV: 1, MAR: 2, ABR: 3, MAI: 4, JUN: 5,
        JUL: 6, AGO: 7, SET: 8, OUT: 9, NOV: 10, DEZ: 11,
      };

      const mes = meses[mesTxt];
      if (!Number.isInteger(dia) || !Number.isInteger(ano) || mes === undefined) return null;
      return new Date(ano, mes, dia);
    }

    function formatarIntervalo(dataInicio, dataFim) {
      const ini = (dataInicio || '').trim();
      const fim = (dataFim || '').trim();
      if (fim && fim !== ini) return `${ini} até ${fim}`;
      return ini;
    }

    function parseCsvEventos(csvText) {
      const linhas = csvText.split(/\r?\n/).filter(l => l.trim());
      if (linhas.length < 2) return [];

      const cabecalho = linhas[0].split(';').map(c => c.trim());
      const eventos = [];

      for (let i = 1; i < linhas.length; i += 1) {
        const colunas = linhas[i].split(';');
        if (colunas.length < cabecalho.length) continue;
        const item = {};
        for (let j = 0; j < cabecalho.length; j += 1) {
          item[cabecalho[j]] = (colunas[j] || '').trim();
        }
        eventos.push(item);
      }

      return eventos;
    }

    function normalizarFuturo(eventos) {
      const hoje = new Date();
      hoje.setHours(0, 0, 0, 0);

      return eventos
        .map((ev) => {
          const inicio = parseDataCsv(ev.DATA);
          const fim = parseDataCsv(ev.DATAFINAL) || inicio;
          return {
            descricao: ev.DESCRICAO || 'Evento sem descrição',
            local: ev.NOMELOCAL || ev.LOCAL || 'Local não informado',
            endereco: ev.ENDERECO || ev.ENDERECOLOCAL || 'Endereço não informado',
            publico: ev.ESTIMATIVAPUBLICO || 'Não informado',
            dataInicioTxt: ev.DATA || '',
            dataFimTxt: ev.DATAFINAL || ev.DATA || '',
            inicio,
            fim,
          };
        })
        .filter(ev => ev.inicio && ev.fim && ev.fim >= hoje)
        .sort((a, b) => a.inicio - b.inicio)
        .slice(0, 12);
    }

    function atualizarIndicador() {
      const indicador = document.getElementById('carousel-indicator');
      if (!indicador) return;
      const total = carouselState.eventos.length;
      const atual = total ? (carouselState.atual + 1) : 0;
      indicador.textContent = `${atual} / ${total}`;
    }

    function renderEventoAtual() {
      const stage = document.getElementById('events-stage');
      if (!stage) return;

      if (!carouselState.eventos.length) {
        stage.innerHTML = '<div class="events-empty">Nenhum próximo evento encontrado no momento.</div>';
        atualizarIndicador();
        return;
      }

      const ev = carouselState.eventos[carouselState.atual];
      const periodo = formatarIntervalo(ev.dataInicioTxt, ev.dataFimTxt);

      stage.innerHTML = `
        <article class="event-card">
          <div class="event-date">${periodo}</div>
          <div class="event-title">${ev.descricao}</div>
          <div class="event-meta"><strong>Local:</strong> ${ev.local}</div>
          <div class="event-meta"><strong>Endereço:</strong> ${ev.endereco}</div>
          <div class="event-meta"><strong>Público estimado:</strong> ${ev.publico}</div>
        </article>
      `;

      atualizarIndicador();
    }

    function avancarEvento() {
      const total = carouselState.eventos.length;
      if (!total) return;
      carouselState.atual = (carouselState.atual + 1) % total;
      renderEventoAtual();
    }

    function voltarEvento() {
      const total = carouselState.eventos.length;
      if (!total) return;
      carouselState.atual = (carouselState.atual - 1 + total) % total;
      renderEventoAtual();
    }

    function iniciarAutoRotacao() {
      if (carouselState.timer) clearInterval(carouselState.timer);
      carouselState.timer = setInterval(avancarEvento, 2000);
    }

    async function carregarCarrosselEventos() {
      const stage = document.getElementById('events-stage');
      if (!stage) return;

      try {
        const resposta = await fetch('eventos_bh.csv', { cache: 'no-store' });
        if (!resposta.ok) throw new Error('Falha ao carregar CSV de eventos.');
        const csvText = await resposta.text();

        const eventos = parseCsvEventos(csvText);
        carouselState.eventos = normalizarFuturo(eventos);
        carouselState.atual = 0;
        renderEventoAtual();
        iniciarAutoRotacao();
      } catch (erro) {
        stage.innerHTML = '<div class="events-empty">Não foi possível carregar os próximos eventos.</div>';
        atualizarIndicador();
      }
    }

    function showPage(id) {
      const def = pages[id];
      if (!def) return;
      document.getElementById('welcome').classList.toggle('hidden', id !== 'welcome');
      Object.keys(pages).forEach(pid => {
        const p = pages[pid];
        if (!p.frame) return;
        const el = document.getElementById(p.frame);
        const active = pid === id;
        el.classList.toggle('visible', active);
        if (active && !loadedFrames.has(pid)) { el.src = p.src; loadedFrames.add(pid); }
      });
      document.querySelectorAll('.nav-item').forEach(btn => btn.classList.toggle('active', btn.dataset.page === id));
      document.getElementById('topbar-breadcrumb').textContent = def.label;
      if (window.innerWidth <= 768) closeMobileSidebar();
    }

    const sidebarEl = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('sidebar-toggle');
    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('sidebar-collapsed');
      const col = document.body.classList.contains('sidebar-collapsed');
      toggleBtn.innerHTML = col ? '&#8250;' : '&#8249;';
      toggleBtn.title     = col ? 'Expandir menu' : 'Recolher menu';
    });

    function toggleMobileSidebar() {
      const open = sidebarEl.classList.toggle('mobile-open');
      document.getElementById('overlay').classList.toggle('active', open);
    }
    function closeMobileSidebar() {
      sidebarEl.classList.remove('mobile-open');
      document.getElementById('overlay').classList.remove('active');
    }
    document.getElementById('overlay').addEventListener('click', closeMobileSidebar);
    document.getElementById('carousel-prev').addEventListener('click', voltarEvento);
